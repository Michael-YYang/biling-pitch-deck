<!DOCTYPE html>
<html lang="zh">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .slide-container {
      width: 1280px;
      min-height: 720px;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .bg-glow-tl {
      position: absolute;
      top: -120px; left: -120px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
    }
    .bg-glow-br {
      position: absolute;
      bottom: -100px; right: -80px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
    }
    .card {
      position: relative;
      z-index: 2;
      background: rgba(22,27,34,0.95);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 4px;
      width: 680px;
      padding: 60px 64px;
      text-align: center;
    }
    .tag {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: #00d4ff;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .title-main {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 80px;
      font-weight: 700;
      background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 50%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 24px;
    }
    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 300;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.04em;
      margin-bottom: 36px;
    }
    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, #00d4ff, #7c3aed);
      margin: 0 auto 36px;
    }
    .date {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
    }
    .corner-deco {
      position: absolute;
      z-index: 1;
    }
    .corner-tl {
      top: 32px; left: 32px;
      width: 40px; height: 40px;
      border-top: 2px solid rgba(0,212,255,0.4);
      border-left: 2px solid rgba(0,212,255,0.4);
    }
    .corner-br {
      bottom: 32px; right: 32px;
      width: 40px; height: 40px;
      border-bottom: 2px solid rgba(124,58,237,0.4);
      border-right: 2px solid rgba(124,58,237,0.4);
    }
  </style>
</head>
<body>
<div class="slide-container">
  <div class="bg-grid"></div>
  <div class="bg-glow-tl"></div>
  <div class="bg-glow-br"></div>
  <div class="corner-deco corner-tl"></div>
  <div class="corner-deco corner-br"></div>
  <div class="card">
    <div class="tag">Competitive Research &amp; Brainstorm</div>
    <div class="title-main">笔灵</div>
    <div class="subtitle">智能社媒内容生产与流量优化工具</div>
    <div class="divider"></div>
    <div class="date">2026 年 3 月</div>
  </div>
</div>
</body>
</html>
